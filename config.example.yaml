# Copy this to ~/.touchgrass/config.yaml and edit.
# Multi-project from day one — list every project the daemon should be willing to
# run sessions against. There is no single-project shortcut.


projects:
  - name: scratch
    path: <FILL IN — absolute path to a low-stakes repo on your machine>
    pre_approved_tools: []
    pre_denied_tools: []

ntfy:
  topic: touchgrass-placeholder-phase2

bearer_token: <FILL IN — run: openssl rand -hex 24>

permission_timeout_seconds: 300
bind_address: 0.0.0.0
port: 8765

